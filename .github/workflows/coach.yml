name: Entrenador FORJA

# Horarios en UTC. Espana verano = UTC+2:
#  07:00 UTC = 09:00 Espana (buenos dias)
#  09:30 UTC = 11:30 Espana (pre-gym)
#  13:00 UTC = 15:00 Espana (proteina)
#  17:45 UTC = 19:45 Espana (pre-cardio)
on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '30 9 * * *'
    - cron: '0 13 * * *'
    - cron: '45 17 * * *'
  workflow_dispatch:

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: ./coach-server
      - run: node coach.js
        working-directory: ./coach-server
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
