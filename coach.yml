name: Entrenador FORJA

# Horarios en UTC. España en verano = UTC+2, así que:
#  09:30 UTC = 11:30 España (pre-gym)
#  07:00 UTC = 09:00 España (mañana)
#  13:00 UTC = 15:00 España (comida/proteína)
#  17:45 UTC = 19:45 España (pre-cardio)
on:
  schedule:
    - cron: '0 7 * * *'    # 09:00 España - buenos días
    - cron: '30 9 * * *'   # 11:30 España - en breve gym
    - cron: '0 13 * * *'   # 15:00 España - proteína
    - cron: '45 17 * * *'  # 19:45 España - a caminar
  workflow_dispatch:        # permite lanzarlo a mano para probar

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install
        working-directory: ./coach-server

      - name: Enviar mensaje del entrenador
        run: node coach.js
        working-directory: ./coach-server
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
